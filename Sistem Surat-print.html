<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DILAN CERDAS — Cetak / PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="shell.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    window.__PRINT__ = true;
    window.useState = React.useState;
    window.useEffect = React.useEffect;
    window.useRef = React.useRef;
    window.useMemo = React.useMemo;
    window.useCallback = React.useCallback;
  </script>

  <style>
    /* ---- Print layout ---- */
    body { background: #fff; }
    .print-root { background: #fff; }

    .print-cover {
      background: var(--navy-900);
      color: #fff;
      padding: 60px 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 60vh;
      break-after: page;
    }
    .print-cover .emblem {
      border-radius: 14px;
      background: linear-gradient(150deg, var(--gold-400), var(--gold-600));
      display: grid; place-items: center;
    }
    .print-cover-foot { font-size: 13px; color: oklch(0.72 0.03 256); line-height: 1.9; }

    .print-page { break-before: page; padding: 0 0 8px; }
    .modbar {
      display: flex; align-items: baseline; gap: 12px;
      padding: 16px 28px; background: var(--navy-900); color: #fff;
    }
    .modbar .modgroup {
      font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      color: var(--gold-400);
    }
    .modbar .modname { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
    .print-content { max-width: 100%; padding: 24px 28px 8px; }

    /* Login renders its own full-height grid — constrain it for print */
    .login-static .login-wrap { min-height: auto; }
    .login-static .login-side { min-height: 540px; }

    /* Avoid breaking cards / rows across pages */
    .card, .stat, .org-node, .info-row, table.tbl tr, .likert, .role-opt { break-inside: avoid; }
    .page-head { break-after: avoid; }

    @media print {
      @page { size: A4 landscape; margin: 0.5cm; }
      html, body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .topbar, .sidebar, .tweak-dock, .menu-toggle { display: none !important; }
      .print-cover { min-height: 92vh; }
      .login-static .login-side { display: flex; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="data.js"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-api.js"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens/dashboard.jsx"></script>
  <script type="text/babel" src="screens/rekap.jsx"></script>
  <script type="text/babel" src="screens/forms.jsx"></script>
  <script type="text/babel" src="screens/org.jsx"></script>
  <script type="text/babel" src="screens/layanan.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="print-app.jsx"></script>
</body>
</html>
